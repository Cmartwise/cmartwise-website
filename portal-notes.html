<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coaching Notes — CmartWise Portal</title>
<style>
:root{
  --ocean:#1A3A4A;--sand:#FAF7F3;--terra:#C4683A;--muted:#5A7A8A;
  --ivory:#F5F0E8;--cream:#EDE8DF;--leaf:#3D7A5A;
  --border:rgba(26,58,74,.10);--shadow:0 2px 16px rgba(26,58,74,.08);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:var(--sand);min-height:100vh}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:.75rem;
  padding:.9rem 2.5rem;background:rgba(250,247,243,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border)}
.logo-wrap{display:flex;align-items:center;gap:.6rem;text-decoration:none}
.logo-mark{width:30px;height:30px;background:var(--ocean);border-radius:7px;
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-style:italic;font-size:.95rem;font-family:Georgia,serif;font-weight:700}
.logo-text{font-size:.95rem;color:var(--ocean);font-weight:600}
.logo-badge{font-size:.7rem;background:var(--ocean);color:#fff;border-radius:4px;
  padding:.15rem .45rem;margin-left:.25rem;letter-spacing:.05em}
.nav-spacer{flex:1}
.nav-back{font-size:.82rem;color:var(--muted);text-decoration:none}
.nav-back:hover{color:var(--ocean)}
.nav-logout{font-size:.82rem;color:var(--muted);background:none;border:1px solid var(--border);
  border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-family:Georgia,serif;transition:.15s}
.nav-logout:hover{border-color:var(--ocean);color:var(--ocean)}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;
  color:var(--muted);font-size:.95rem}

.layout{max-width:1100px;margin:0 auto;padding:2rem 1.5rem;display:none;
  display:grid;grid-template-columns:280px 1fr;gap:1.5rem;min-height:calc(100vh - 65px)}
@media(max-width:700px){.layout{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{}
.sidebar-header{margin-bottom:1rem}
.sidebar-title{font-size:1rem;color:var(--ocean);margin-bottom:.25rem}
.sidebar-sub{font-size:.8rem;color:var(--muted)}

.filter-group{margin-bottom:1rem}
.filter-label{font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);font-family:monospace;margin-bottom:.4rem;display:block}
.tag-filter{display:flex;flex-wrap:wrap;gap:.4rem}
.tag-btn{font-size:.75rem;padding:.25rem .6rem;border-radius:20px;border:1px solid var(--border);
  background:#fff;color:var(--muted);cursor:pointer;transition:.15s;font-family:Georgia,serif}
.tag-btn.active{background:var(--ocean);color:#fff;border-color:var(--ocean)}
.tag-btn:hover:not(.active){border-color:var(--ocean);color:var(--ocean)}

.note-list{display:flex;flex-direction:column;gap:.6rem}
.note-item{background:#fff;border-radius:8px;border:1px solid var(--border);
  padding:.9rem 1rem;cursor:pointer;transition:.15s;display:block}
.note-item:hover,.note-item.active{border-color:var(--ocean)}
.note-item.active{background:var(--ivory)}
.note-item-date{font-size:.7rem;color:var(--muted);font-family:monospace;margin-bottom:.2rem}
.note-item-title{font-size:.9rem;color:var(--ocean)}
.note-item-tags{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap}
.note-item-tag{font-size:.65rem;background:var(--ivory);color:var(--muted);border-radius:10px;padding:.1rem .4rem}
.note-pin{float:right;font-size:.7rem;color:var(--terra)}

/* MAIN */
.note-view{background:#fff;border-radius:var(--radius);border:1px solid var(--border);
  padding:2rem;box-shadow:var(--shadow)}
.note-view-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;color:var(--muted);text-align:center;gap:.75rem}
.note-view-empty .icon{font-size:2.5rem}

.note-view-header{margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--cream)}
.note-view-date{font-size:.75rem;color:var(--muted);font-family:monospace;margin-bottom:.3rem}
.note-view-title{font-size:1.4rem;color:var(--ocean);margin-bottom:.6rem}
.note-view-tags{display:flex;gap:.4rem;flex-wrap:wrap}
.note-view-tag{font-size:.75rem;background:var(--ivory);color:var(--muted);border-radius:20px;padding:.2rem .6rem}

.note-content{color:#2a3a3a;line-height:1.8;font-size:.95rem}
.note-content h1,.note-content h2,.note-content h3{color:var(--ocean);margin:1.25rem 0 .5rem}
.note-content h2{font-size:1.1rem}
.note-content h3{font-size:.95rem;color:var(--muted)}
.note-content p{margin-bottom:.85rem}
.note-content ul,.note-content ol{margin:.5rem 0 .85rem 1.25rem}
.note-content li{margin-bottom:.35rem}
.note-content strong{color:var(--ocean)}
.note-content em{color:var(--terra);font-style:italic}
.note-content code{background:var(--ivory);padding:.1rem .35rem;border-radius:4px;
  font-family:monospace;font-size:.88rem;color:var(--ocean)}
.note-content blockquote{border-left:3px solid var(--ocean);padding:.5rem 1rem;
  margin:.75rem 0;background:var(--ivory);border-radius:0 8px 8px 0;
  font-style:italic;color:var(--muted)}
.note-content hr{border:none;border-top:1px solid var(--cream);margin:1.25rem 0}

.empty-portal{text-align:center;padding:3rem;color:var(--muted)}
.empty-portal .icon{font-size:2.5rem;margin-bottom:.75rem}

/* ADMIN: add note button */
.add-note-btn{width:100%;padding:.7rem;border:1.5px dashed var(--border);border-radius:8px;
  background:none;color:var(--muted);font-family:Georgia,serif;font-size:.85rem;
  cursor:pointer;transition:.15s;margin-bottom:1rem}
.add-note-btn:hover{border-color:var(--ocean);color:var(--ocean)}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo-wrap">
    <div class="logo-mark">C</div>
    <span class="logo-text">CmartWise</span>
  </a>
  <span class="logo-badge">Student Portal</span>
  <div class="nav-spacer"></div>
  <a href="/portal-dashboard.html" class="nav-back">← Dashboard</a>
  <button class="nav-logout" onclick="logout()">Sign out</button>
</nav>

<div id="loading" style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--muted)">Loading notes…</div>

<div class="layout" id="main-layout" style="display:none">

  <div class="sidebar">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Coaching Notes</h2>
      <p class="sidebar-sub">Your private session notes, added by Cédric after each session.</p>
    </div>

    <!-- Admin only: add note -->
    <button class="add-note-btn" id="add-note-btn" style="display:none" onclick="openAddNote()">+ Add note (admin)</button>

    <!-- Tag filters -->
    <div class="filter-group" id="tag-filters" style="display:none">
      <span class="filter-label">Filter by topic</span>
      <div class="tag-filter" id="tag-filter-btns"></div>
    </div>

    <!-- Admin: student selector -->
    <div class="filter-group" id="student-filter" style="display:none">
      <span class="filter-label">Student</span>
      <select id="student-select" style="width:100%;padding:.5rem;border-radius:6px;border:1px solid var(--border);font-family:Georgia,serif;font-size:.85rem;color:var(--ocean)" onchange="loadNotes()">
        <option value="">All students</option>
      </select>
    </div>

    <div class="note-list" id="note-list">
      <div style="color:var(--muted);font-size:.85rem;padding:.5rem">Loading…</div>
    </div>
  </div>

  <div class="note-view" id="note-view">
    <div class="note-view-empty">
      <div class="icon">📋</div>
      <p>Select a note from the left to read it.</p>
    </div>
  </div>
</div>

<!-- ADD NOTE MODAL (admin only) -->
<div id="note-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:12px;padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto">
    <h2 style="color:var(--ocean);margin-bottom:1.25rem">Add coaching note</h2>
    <div style="margin-bottom:1rem">
      <label style="font-size:.8rem;color:var(--ocean);display:block;margin-bottom:.35rem">Student</label>
      <select id="modal-student" style="width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);font-family:Georgia,serif"></select>
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:.8rem;color:var(--ocean);display:block;margin-bottom:.35rem">Session date</label>
      <input type="date" id="modal-date" style="width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);font-family:Georgia,serif">
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:.8rem;color:var(--ocean);display:block;margin-bottom:.35rem">Title</label>
      <input type="text" id="modal-title" placeholder="e.g. Session 3 — Pronunciation & Shopping Vocab" style="width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);font-family:Georgia,serif">
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:.8rem;color:var(--ocean);display:block;margin-bottom:.35rem">Tags (comma separated)</label>
      <input type="text" id="modal-tags" placeholder="pronunciation, vocabulary, grammar" style="width:100%;padding:.6rem;border-radius:6px;border:1px solid var(--border);font-family:Georgia,serif">
    </div>
    <div style="margin-bottom:1.25rem">
      <label style="font-size:.8rem;color:var(--ocean);display:block;margin-bottom:.35rem">Notes (supports **bold**, *italic*, ## headings, - lists)</label>
      <textarea id="modal-content" rows="12" style="width:100%;padding:.75rem;border-radius:6px;border:1px solid var(--border);font-family:monospace;font-size:.85rem;resize:vertical" placeholder="## What we covered&#10;&#10;- ...&#10;&#10;## Key phrases to practise&#10;&#10;- ...&#10;&#10;## Homework&#10;&#10;- ..."></textarea>
    </div>
    <div style="display:flex;gap:.75rem">
      <button onclick="saveNote()" style="flex:1;padding:.75rem;background:var(--ocean);color:#fff;border:none;border-radius:8px;font-family:Georgia,serif;font-size:.95rem;cursor:pointer">Save note</button>
      <button onclick="closeModal()" style="padding:.75rem 1.25rem;background:none;border:1px solid var(--border);border-radius:8px;font-family:Georgia,serif;cursor:pointer;color:var(--muted)">Cancel</button>
    </div>
    <div id="modal-msg" style="margin-top:.75rem;font-size:.85rem;color:var(--terra);display:none"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://zsgnggtwfxyqzvrnlaqg.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZ25nZ3R3Znh5cXp2cm5sYXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTYzMzIsImV4cCI6MjA5NjY3MjMzMn0.7iclLaCjyejXHmCcWAJvRJTICrCGt7ks5LieRY0Z9aM'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

let currentUser = null, isAdmin = false, allNotes = [], activeTag = null

async function logout() { await sb.auth.signOut(); window.location.href = '/portal.html' }

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { window.location.href = '/portal.html'; return }
  currentUser = session.user

  const { data: profile } = await sb.from('profiles').select('*').eq('id', currentUser.id).single()
  isAdmin = profile?.role === 'admin'

  if (isAdmin) {
    document.getElementById('add-note-btn').style.display = 'block'
    document.getElementById('student-filter').style.display = 'block'
    // Load student list
    const { data: students } = await sb.from('profiles').select('id,full_name,email').eq('role','student').order('full_name')
    const sel = document.getElementById('student-select')
    const mSel = document.getElementById('modal-student')
    students?.forEach(s => {
      sel.innerHTML += `<option value="${s.id}">${s.full_name} (${s.email})</option>`
      mSel.innerHTML += `<option value="${s.id}">${s.full_name}</option>`
    })
  }

  await loadNotes()
  document.getElementById('loading').style.display = 'none'
  document.getElementById('main-layout').style.display = 'grid'
}

async function loadNotes() {
  let query = sb.from('coaching_notes').select('*').order('session_date', { ascending: false })
  if (!isAdmin) query = query.eq('student_id', currentUser.id)
  else {
    const studentId = document.getElementById('student-select')?.value
    if (studentId) query = query.eq('student_id', studentId)
  }

  const { data: notes } = await query
  allNotes = notes || []
  renderNoteList()
}

function renderNoteList() {
  const notes = activeTag ? allNotes.filter(n => n.tags?.includes(activeTag)) : allNotes

  // Collect all tags
  const allTags = [...new Set(allNotes.flatMap(n => n.tags || []))]
  if (allTags.length) {
    document.getElementById('tag-filters').style.display = 'block'
    document.getElementById('tag-filter-btns').innerHTML =
      `<button class="tag-btn ${!activeTag ? 'active' : ''}" onclick="filterTag(null)">All</button>` +
      allTags.map(t => `<button class="tag-btn ${activeTag === t ? 'active' : ''}" onclick="filterTag('${esc(t)}')">${esc(t)}</button>`).join('')
  }

  const list = document.getElementById('note-list')
  if (!notes.length) {
    list.innerHTML = `<div style="color:var(--muted);font-size:.85rem;padding:.5rem">No notes yet.</div>`
    return
  }
  list.innerHTML = notes.map(n => `
    <div class="note-item" onclick="showNote('${n.id}')">
      ${n.pinned ? `<span class="note-pin">📌</span>` : ''}
      <div class="note-item-date">${formatDate(n.session_date)}</div>
      <div class="note-item-title">${esc(n.title)}</div>
      ${n.tags?.length ? `<div class="note-item-tags">${n.tags.map(t => `<span class="note-item-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>
  `).join('')
}

function filterTag(tag) {
  activeTag = tag
  renderNoteList()
}

function showNote(id) {
  const note = allNotes.find(n => n.id === id)
  if (!note) return
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('active'))
  document.querySelector(`[onclick="showNote('${id}')"]`)?.classList.add('active')

  document.getElementById('note-view').innerHTML = `
    <div class="note-view-header">
      <div class="note-view-date">${formatDate(note.session_date)}</div>
      <h2 class="note-view-title">${esc(note.title)}</h2>
      ${note.tags?.length ? `<div class="note-view-tags">${note.tags.map(t => `<span class="note-view-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    </div>
    <div class="note-content">${renderMarkdown(note.content || '')}</div>
  `
}

// Simple markdown renderer
function renderMarkdown(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[h|u|o|l|b|h|p])/gm, '')
    // Wrap remaining text in paragraphs
    .split('\n').map(line => {
      if (!line.trim() || line.startsWith('<')) return line
      return `<p>${line}</p>`
    }).join('\n')
}

function openAddNote() {
  document.getElementById('modal-date').value = new Date().toISOString().split('T')[0]
  document.getElementById('note-modal').style.display = 'flex'
}
function closeModal() {
  document.getElementById('note-modal').style.display = 'none'
  document.getElementById('modal-content').value = ''
  document.getElementById('modal-title').value = ''
  document.getElementById('modal-tags').value = ''
  document.getElementById('modal-msg').style.display = 'none'
}

async function saveNote() {
  const studentId = document.getElementById('modal-student').value
  const title     = document.getElementById('modal-title').value.trim()
  const content   = document.getElementById('modal-content').value.trim()
  const tags      = document.getElementById('modal-tags').value.split(',').map(t => t.trim()).filter(Boolean)
  const date      = document.getElementById('modal-date').value
  const msg       = document.getElementById('modal-msg')

  if (!studentId || !title) { msg.textContent = 'Student and title are required.'; msg.style.display = 'block'; return }

  const { error } = await sb.from('coaching_notes').insert({
    student_id: studentId, title, content, tags,
    session_date: date || new Date().toISOString().split('T')[0],
    created_by: currentUser.id
  })

  if (error) { msg.textContent = 'Error: ' + error.message; msg.style.display = 'block'; return }

  closeModal()
  await loadNotes()
}

function formatDate(d) {
  if (!d) return ''
  return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

init()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Set Password — Cmartwise Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FBF3E7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
a{color:#C15B37;text-decoration:none}
a:hover{color:#9C4527}
.cw-blob{border-radius:58% 42% 61% 39% / 47% 45% 55% 53%}

.logo-link{display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
.logo-mark{position:relative;width:56px;height:48px}
.logo-name{font-family:'Quicksand';font-weight:700;font-size:22px;color:#3A332C}
.portal-badge{font:600 11px 'DM Sans';letter-spacing:.12em;text-transform:uppercase;color:#2F8FA6;background:#E4F0F2;padding:5px 12px;border-radius:100px}

.card{width:100%;max-width:400px;background:#fff;border-radius:20px;padding:36px;box-shadow:0 6px 24px rgba(58,51,44,.08);display:flex;flex-direction:column;gap:18px;box-sizing:border-box}
.card-title{font-family:'Quicksand';font-weight:700;font-size:22px;color:#3A332C;margin-bottom:2px}
.card-sub{font:400 14px/1.5 'DM Sans';color:#5A5147}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font:600 12px 'DM Sans';color:#3A332C}
input{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid #F0E4CE;font-size:14px;font-family:'DM Sans',sans-serif;color:#3A332C;background:#FBF3E7;outline:none;transition:.15s}
input:focus{outline:2px solid #2F8FA6;outline-offset:1px;background:#fff}

.strength-bar{height:4px;border-radius:2px;background:#F0E4CE;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}

.btn{border:none;cursor:pointer;font:700 15px 'Quicksand';color:#FBF3E7;background:#D9724C;padding:13px;border-radius:12px;width:100%;transition:.2s}
.btn:hover{background:#C15B37}
.btn:disabled{opacity:.5;cursor:not-allowed}

.msg{font:500 13px 'DM Sans';display:none;line-height:1.5;margin-top:12px}
.msg.error{color:#C0392B}
.msg.success{color:#2F8FA6}
.msg.show{display:block}

footer{margin-top:28px;font:600 13px 'DM Sans';color:#5A5147;text-align:center}
</style>
</head>
<body>

<a href="/" class="logo-link">
  <div class="logo-mark">
    <div class="cw-blob" style="position:absolute;inset:0;background:linear-gradient(135deg,#F0A97D,#D9724C)"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Quicksand';font-weight:700;font-size:20px;color:#FBF3E7">CW</div>
  </div>
  <span class="logo-name">Cmartwise</span>
  <span class="portal-badge">Student Portal</span>
</a>

<div class="card" id="card-set">
  <div>
    <h1 class="card-title" id="card-title">Set your password</h1>
    <p class="card-sub" id="card-sub">Choose a password to secure your account.</p>
  </div>

  <form id="reset-form" onsubmit="handleReset(event)">
    <div class="form-group">
      <label for="password">New password (min. 8 characters)</label>
      <input type="password" id="password" placeholder="••••••••" required minlength="8"
             autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>
    <div class="form-group">
      <label for="password-confirm">Confirm password</label>
      <input type="password" id="password-confirm" placeholder="••••••••" required
             autocomplete="new-password">
    </div>
    <button type="submit" class="btn" id="reset-btn">Set password &amp; enter portal</button>
    <div id="reset-msg" class="msg"></div>
  </form>
</div>

<!-- Invalid / expired link state -->
<div class="card" id="card-error" style="display:none;text-align:center">
  <h1 class="card-title" style="margin-bottom:1rem">Link expired</h1>
  <p style="font:400 14px/1.6 'DM Sans';color:#5A5147;margin-bottom:1.5rem">
    This link has expired or already been used. Ask Cédric to send a new invite, or reset your password from the sign-in page.
  </p>
  <a href="/portal.html" class="btn" style="display:block;text-align:center;padding:13px;box-sizing:border-box">
    Back to sign in
  </a>
</div>

<footer>
  <a href="/">← Back to cmartwise-coaching.eu</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://zsgnggtwfxyqzvrnlaqg.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZ25nZ3R3Znh5cXp2cm5sYXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTYzMzIsImV4cCI6MjA5NjY3MjMzMn0.7iclLaCjyejXHmCcWAJvRJTICrCGt7ks5LieRY0Z9aM'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

// Parse token from URL hash (Supabase puts it there for invite + recovery)
const hash   = window.location.hash.substring(1)
const params = Object.fromEntries(new URLSearchParams(hash))
const type   = params.type  // 'invite' or 'recovery'
const token  = params.access_token

if (!token) {
  // No token — show error card
  document.getElementById('card-set').style.display   = 'none'
  document.getElementById('card-error').style.display = 'block'
} else {
  // Set session from the token so Supabase knows who we are
  sb.auth.setSession({ access_token: token, refresh_token: params.refresh_token || '' })

  if (type === 'invite') {
    document.getElementById('card-title').textContent = 'Welcome to the portal!'
    document.getElementById('card-sub').textContent   = 'Choose a password to activate your account.'
    document.getElementById('reset-btn').textContent  = 'Activate account & enter portal'
  }
}

function checkStrength(val) {
  const fill = document.getElementById('strength-fill')
  let score = 0
  if (val.length >= 8)  score++
  if (val.length >= 12) score++
  if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++
  if (/[^A-Za-z0-9]/.test(val)) score++
  const pct   = ['0%','30%','55%','80%','100%'][score]
  const color = ['#ccc','#E6B84F','#F0A97D','#2F8FA6','#1F6B57'][score]
  fill.style.width = pct; fill.style.background = color
}

function showMsg(text, type) {
  const el = document.getElementById('reset-msg')
  el.textContent = text
  el.className = `msg ${type} show`
}

async function handleReset(e) {
  e.preventDefault()
  const pw  = document.getElementById('password').value
  const pw2 = document.getElementById('password-confirm').value
  if (pw !== pw2) { showMsg('Passwords don\'t match — please try again.', 'error'); return }

  const btn = document.getElementById('reset-btn')
  btn.disabled = true; btn.textContent = 'Saving...'

  const { error } = await sb.auth.updateUser({ password: pw })
  if (error) {
    showMsg(error.message, 'error')
    btn.disabled = false
    btn.textContent = type === 'invite' ? 'Activate account & enter portal' : 'Set password & enter portal'
  } else {
    showMsg('Password set! Taking you to your portal…', 'success')
    setTimeout(() => { window.location.href = '/portal-dashboard.html' }, 1500)
  }
}
</script>
</body>
</html>

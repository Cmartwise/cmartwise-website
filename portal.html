<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Portal — Cmartwise</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#FBF3E7;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
a{color:#C15B37;text-decoration:none}
a:hover{color:#9C4527}
.cw-blob{border-radius:58% 42% 61% 39% / 47% 45% 55% 53%}

.logo-link{display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;margin-bottom:28px}
.logo-mark{position:relative;width:56px;height:48px}
.logo-name{font-family:'Quicksand';font-weight:700;font-size:22px;color:#3A332C}
.portal-badge{font:600 11px 'DM Sans';letter-spacing:.12em;text-transform:uppercase;color:#2F8FA6;background:#E4F0F2;padding:5px 12px;border-radius:100px}

.card{width:100%;max-width:400px;background:#fff;border-radius:20px;padding:36px;box-shadow:0 6px 24px rgba(58,51,44,.08);display:flex;flex-direction:column;gap:18px;box-sizing:border-box}
.card-title{font-family:'Quicksand';font-weight:700;font-size:22px;color:#3A332C;margin-bottom:2px}
.card-sub{font:400 14px/1.5 'DM Sans';color:#5A5147}

.form-group{display:flex;flex-direction:column;gap:6px}
label{font:600 12px 'DM Sans';color:#3A332C}
input{padding:12px 14px;border-radius:10px;border:1.5px solid #F0E4CE;font-size:14px;font-family:'DM Sans',sans-serif;color:#3A332C;background:#FBF3E7;outline:none;transition:.15s}
input:focus{outline:2px solid #2F8FA6;outline-offset:1px;background:#fff}
input::placeholder{color:#8A7A5E;opacity:.7}

.btn{border:none;cursor:pointer;font:700 15px 'Quicksand';color:#FBF3E7;background:#D9724C;padding:13px;border-radius:12px;transition:.2s}
.btn:hover{background:#C15B37}
.btn:disabled{opacity:.5;cursor:not-allowed}

.msg{font:500 13px 'DM Sans';display:none;line-height:1.5}
.msg.error{color:#C0392B}
.msg.success{color:#2F8FA6}
.msg.show{display:block}

.forgot{text-align:center;font:600 13px 'DM Sans';color:#5A5147;cursor:pointer}
.invite-note{margin-top:6px;padding:14px 16px;background:#FBF3E7;border-radius:12px;font:400 13px/1.5 'DM Sans';color:#5A5147;text-align:center}

footer{margin-top:28px;font:600 13px 'DM Sans';color:#5A5147;text-align:center}
</style>
</head>
<body>

<a href="/" class="logo-link">
  <div class="logo-mark">
    <div class="cw-blob" style="position:absolute;inset:0;background:linear-gradient(135deg,#F0A97D,#D9724C)"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Quicksand';font-weight:700;font-size:20px;color:#FBF3E7">CW</div>
  </div>
  <span class="logo-name">Cmartwise</span>
  <span class="portal-badge">Student Portal</span>
</a>

<div class="card">
  <div>
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to access your coaching notes, resources, and practice tests.</p>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group" style="margin-bottom:14px">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="you@email.com" required autocomplete="email">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="login-btn" style="width:100%">Sign in</button>
    <div id="login-msg" class="msg" style="margin-top:12px"></div>
    <p class="forgot" style="margin-top:14px"><a href="#" onclick="handleForgot(event)">Forgot your password?</a></p>
  </form>

  <div class="invite-note">
    New student? You'll receive an invitation link from Cédric by email to set up your account.
  </div>
</div>

<footer>
  <a href="/">← Back to cmartwise-coaching.eu</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://zsgnggtwfxyqzvrnlaqg.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZ25nZ3R3Znh5cXp2cm5sYXFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTYzMzIsImV4cCI6MjA5NjY3MjMzMn0.7iclLaCjyejXHmCcWAJvRJTICrCGt7ks5LieRY0Z9aM'

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

// Redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/portal-dashboard.html'
})

function showMsg(id, text, type) {
  const el = document.getElementById(id)
  el.textContent = text
  el.className = `msg ${type} show`
}

async function handleLogin(e) {
  e.preventDefault()
  const btn = document.getElementById('login-btn')
  btn.disabled = true; btn.textContent = 'Signing in...'
  const email    = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) {
    showMsg('login-msg', error.message === 'Invalid login credentials'
      ? 'Email or password not recognised. Try again or reset your password.'
      : error.message, 'error')
    btn.disabled = false; btn.textContent = 'Sign in'
  } else {
    window.location.href = '/portal-dashboard.html'
  }
}

async function handleForgot(e) {
  e.preventDefault()
  const email = document.getElementById('login-email').value.trim()
  if (!email) {
    showMsg('login-msg', 'Enter your email address first, then click "Forgot your password?"', 'error')
    return
  }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/portal-reset.html'
  })
  if (error) showMsg('login-msg', error.message, 'error')
  else showMsg('login-msg', 'Password reset link sent — check your email.', 'success')
}
</script>
</body>
</html>
